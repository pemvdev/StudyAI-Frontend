<app-navbar></app-navbar>

<div class="classrooms-page">

<div class="container py-5">

  <!-- Header -->
  <div class="page-header">

    <div>
      <h2 class="fw-bold mb-1">Your Classrooms</h2>
      <p class="text-muted mb-0">
        Manage your learning spaces and organize your subjects
      </p>
    </div>

    <button class="btn btn-primary new-classroom-btn"
            (click)="openCreateModal()">
      + New Classroom
    </button>

  </div>

  <!-- Cards -->
  <div class="row g-4">

    <div class="col-12 col-md-6 col-lg-4"
         *ngFor="let classroom of classrooms">

      <div class="classroom-wrapper">

        <app-classroom-card
          [id]="classroom.id"
          [name]="classroom.name"
          [description]="classroom.description"
          [dateOfCreation]="classroom.dateOfCreation"
          (edit)="openEditModal($event)"
          (delete)="handleDelete($event)">
        </app-classroom-card>

      </div>

    </div>

  </div>

</div>

</div>


<!-- Modal -->
<div class="modal fade show d-block modal-modern"
     [class.show]="showCreateModal"
     *ngIf="showCreateModal">

  <div class="modal-dialog modal-dialog-centered">

    <div class="modal-content">

      <div class="modal-header">

        <h5 class="modal-title fw-semibold">
          {{ isEditMode ? 'Edit Classroom' : 'Create Classroom' }}
        </h5>

        <button type="button"
                class="btn-close"
                (click)="hideCreateClassroomModal()">
        </button>

      </div>

      <div class="modal-body">

        <form #createForm="ngForm"
              (ngSubmit)="handleSaveClassroom()">

          <div class="mb-3">

            <label for="name" class="form-label">
              Name
            </label>

            <input
              type="text"
              id="name"
              name="name"
              class="form-control form-modern"
              [(ngModel)]="form.name">

          </div>

          <div class="mb-4">

            <label for="description" class="form-label">
              Description
            </label>

            <textarea
              id="description"
              name="description"
              class="form-control form-modern"
              [(ngModel)]="form.description">
            </textarea>

          </div>

          <button type="submit"
                  class="btn btn-primary save-btn"
                  [disabled]="!createForm.valid">

            {{ isEditMode ? 'Save Changes' : 'Create' }}

          </button>

        </form>

      </div>

    </div>

  </div>

</div>
