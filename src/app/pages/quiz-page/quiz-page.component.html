<app-navbar></app-navbar>

<div class="container py-5">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">My Quizzes</h2>
    <button class="btn btn-primary" routerLink="/quizzes/new">
      + New Quiz
    </button>
  </div>

  <!-- Caso não tenha quizzes -->
  <div *ngIf="!quizzes || quizzes.length === 0" 
       class="text-center text-muted py-5">
    <h5>No quizzes found</h5>
    <p>Generate your first quiz to get started.</p>
  </div>

  <!-- Lista de quizzes -->
  <div class="row g-4" *ngIf="quizzes && quizzes.length > 0">

    <div class="col-md-6 col-lg-4" *ngFor="let quiz of quizzes">

      <div class="card shadow-sm border-0 rounded-4 h-100">

        <div class="card-body d-flex flex-column">

          <!-- Header -->
          <div class="mb-3">
            <h5 class="fw-bold mb-1">
              Quiz #{{ quiz.id }}
            </h5>
            <small class="text-muted">
              Created on {{ quiz.createdAt }}
            </small>
          </div>

          <!-- Informações -->
          <div class="mb-3">

            <div class="d-flex justify-content-between">
              <span class="text-muted">Score</span>
              <span class="fw-bold text-primary">
                {{ quiz.score }} / {{ quiz.totalQuestions }}
              </span>
            </div>

            <div class="d-flex justify-content-between mt-2">
              <span class="text-muted">Total Questions  </span>
              <span class="fw-bold">
                {{ quiz.totalQuestions }}
              </span>
            </div>

          </div>

          <!-- Progress visual -->
          <div class="progress mb-4" style="height: 8px;">
            <div
              class="progress-bar bg-success"
              role="progressbar"
              [style.width.%]="(quiz.questions.length / quiz.totalQuestions) * 100">
            </div>
          </div>

          <!-- Botões -->
          <div class="mt-auto d-flex justify-content-between">

            <button class="btn btn-outline-secondary btn-sm">
              View Details
            </button>

            <button class="btn btn-success btn-sm" routerLink="/quizzes/{{ quiz.id }}">
              Retake Quiz
            </button>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
